# SAVADHIKA Spa Booking Application Configuration

# Server Configuration
server.port=8080


# Supabase PostgreSQL Database Configuration
# IMPORTANT: Replace these with your actual Supabase database credentials
spring.datasource.url=jdbc:postgresql://YOUR_SUPABASE_HOST:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=YOUR_SUPABASE_PASSWORD

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=savadhika-spa-booking-secret-key-change-this-in-production
jwt.expiration=86400000

# CORS Configuration (Allow React frontend)
cors.allowed.origins=http://localhost:5173,https://app-*.figma.site,https://app-*.makeproxy-c.figma.site

# Logging
logging.level.com.savadhika=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# Email Configuration (Optional - for booking confirmations)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application Configuration
app.name=SAVADHIKA Spa Booking Portal
app.version=1.0.0
app.admin.email=admin@savadhika.com
app.admin.password=admin123
